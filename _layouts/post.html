---
layout: default
---

<article class="post-container post-container--single" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{page.date | date: date_to_xmlschema}}" itemprop="datePublished"
        class="post-meta__date date">{{page.date | date: "%F"}}</time> &#8226; <span class="post-meta__tags tags">类别：{{
        page.category }}</span> &#8226; <span class="post-meta__tags tags">标签：{{page.tag | join:' '}}</span>
    </div>
    <h2 class="post-title">{{ page.title }}</h2>
  </header>

  <section class="post">
    {{ content }}
  </section>
</article>
